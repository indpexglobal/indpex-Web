<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Industrial Landscape | Indpex Global</title>
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" href="./src/styles/404.css">
</head>
<body class="page-404">
    <div id="navbar-root"></div>

    <main class="error-landscape">
        <canvas id="footprint-canvas"></canvas>
        
        <div class="parallax-layer bg-industrial" data-speed="0.1"></div>
        <div class="parallax-layer mg-industrial" data-speed="0.3"></div>
        
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Shipment Diverted</h2>
            <p class="error-text">The resource you are looking for has been moved or does not exist in our global database.</p>
            <div class="error-actions">
                <a href="index.html" class="btn btn--primary">Return Home</a>
                <a href="products.html" class="btn btn--outline" style="border-color: #fff; color: #fff;">Browse Catalog</a>
            </div>
        </div>

        <div class="traveller-container">
            <div class="traveller" id="traveller">
                <div class="traveller-body"></div>
                <div class="traveller-legs">
                    <div class="leg leg-left"></div>
                    <div class="leg leg-right"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-root"></div>

    <script type="module" src="main.js"></script>
    <script type="module" src="./src/utils/404.js"></script>
</body>
</html>
