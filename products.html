<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Catalog | Indpex Global</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar-root"></div>

    <main>
        <!-- Professional Banner -->
        <section class="banner-corp">
            <div class="l-container">
                <div class="banner-corp__content" data-reveal="fade-in">
                    <h1 class="banner-corp__title">Industrial Catalog</h1>
                    <p class="banner-corp__lead">High-specification machinery, metals, and components for global scale enterprise operations.</p>
                </div>
            </div>
        </section>

        <!-- Structured Catalog Controls -->
        <section class="l-section">
            <div class="l-container">
                <div class="catalog-header">
                    <div class="filter-bar-corp" id="filter-bar">
                        <button class="filter-btn-corp filter-btn--active">All Products</button>
                        <button class="filter-btn-corp">Machinery</button>
                        <button class="filter-btn-corp">Metal Products</button>
                        <button class="filter-btn-corp">Mechanical Components</button>
                    </div>
                </div>

                <div class="l-grid l-grid--4" id="product-grid">
                    <!-- Products dynamically rendered from Supabase -->
                    <div class="loading-state">Initialising catalog...</div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-root"></div>

    <style>
        .banner-corp {
            background-color: var(--color-primary-dark);
            color: #fff;
            padding: 8rem 0 4rem;
            text-align: center;
        }
        .banner-corp__title { font-size: 3rem; margin-bottom: 1rem; color: #fff; }
        .banner-corp__lead { font-size: 1.125rem; max-width: 600px; margin: 0 auto; opacity: 0.8; }

        .catalog-header { margin-bottom: 3rem; border-bottom: 2px solid var(--color-bg-light); padding-bottom: 1.5rem; }
        .filter-bar-corp { display: flex; gap: 1rem; overflow-x: auto; padding: 0.5rem 0; }
        .filter-btn-corp {
            background: none;
            border: 1px solid var(--color-border);
            padding: 0.625rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .filter-btn-corp:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .filter-btn--active {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }

        .loading-state { grid-column: 1 / -1; text-align: center; padding: 5rem; color: var(--color-text-muted); font-weight: 600; }
    </style>

    <script type="module" src="main.js"></script>
</body>
</html>
